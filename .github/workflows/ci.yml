name: CI Pipeline

# El flujo se ejecutará cuando hagas un push o un pull request a la rama 'main'
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Traer el código del repositorio
    - name: Checkout del código
      uses: actions/checkout@v3

    # 2. Configurar el entorno
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Instalar dependencias
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Ejecutar Linting
    - name: Ejecutar Linting con flake8
      run: |
        # Detener el build si hay errores graves de sintaxis
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Advertencias generales de formato
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 5. Ejecutar Tests
    - name: Ejecutar Pruebas con pytest
      run: |
        pytest